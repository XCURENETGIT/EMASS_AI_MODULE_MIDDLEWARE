syntax = "proto3";

package xcn.pii.v1;

service PiiDetector {
  rpc Detect(DetectRequest) returns (DetectResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message DetectRequest {
  string text = 1;
  int32 max_results_per_type = 2;
  string ruleset = 3;
}

message MatchItem {
  int32 start = 1;
  int32 end = 2;
  string match_string = 3;
  bool is_valid = 4;
  double context_score = 5;
  double context_score_norm = 6;
  double context_hybrid_score = 7;
  string context_method = 8;
  string context_accept_by = 9;
  bool context_pass = 10;
  string detected_by = 11;
}

message PiiData {
  reserved 3, 4, 9, 10, 19 to 40, 43 to 44;
  reserved
    "sn_invalid_cnt",
    "sn_invalid",
    "sn_ctx_rejected_cnt",
    "sn_ctx_rejected",
    "ssn_ctx_rejected_cnt",
    "ssn_ctx_rejected",
    "sn_invalid_ctx_rejected_cnt",
    "sn_invalid_ctx_rejected",
    "dn_ctx_rejected_cnt",
    "dn_ctx_rejected",
    "pn_ctx_rejected_cnt",
    "pn_ctx_rejected",
    "mn_ctx_rejected_cnt",
    "mn_ctx_rejected",
    "bn_ctx_rejected_cnt",
    "bn_ctx_rejected",
    "ip_cnt",
    "ip",
    "eml_ctx_rejected_cnt",
    "eml_ctx_rejected",
    "ip_ctx_rejected_cnt",
    "ip_ctx_rejected",
    "cn_ctx_rejected_cnt",
    "cn_ctx_rejected";

  int32 sn_cnt = 1;
  repeated MatchItem sn = 2;

  int32 ssn_cnt = 5;
  repeated MatchItem ssn = 6;

  int32 dn_cnt = 7;
  repeated MatchItem dn = 8;

  int32 pn_cnt = 11;
  repeated MatchItem pn = 12;

  int32 mn_cnt = 13;
  repeated MatchItem mn = 14;

  int32 bn_cnt = 15;
  repeated MatchItem bn = 16;

  int32 eml_cnt = 17;
  repeated MatchItem eml = 18;

  int32 cn_cnt = 41;
  repeated MatchItem cn = 42;

  int32 brn_cnt = 45;
  repeated MatchItem brn = 46;

  int32 an_cnt = 47;
  repeated MatchItem an = 48;
}

message PiiMeta {
  string ruleset_name = 1;
  string ruleset_version = 2;
  string ruleset_updated_at = 3;
}

message DetectResponse {
  bool success = 1;
  int32 status = 2;
  string message = 3;
  PiiData data = 4;
  PiiMeta meta = 5;